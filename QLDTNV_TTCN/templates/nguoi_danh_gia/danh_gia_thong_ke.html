<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dashboard Thống kê đánh giá</title>

<link rel="stylesheet" href="/static/css/style_danh_gia.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#eef2f7;
}
.container{
    width:95%;
    max-width:1500px;
    margin:auto;
    padding:20px;
}
.title{
    font-size:28px;
    font-weight:600;
    margin-bottom:20px;
}
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}
.card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
.card h3{
    margin:0;
    font-size:14px;
    color:#666;
}
.card .value{
    font-size:28px;
    font-weight:700;
    margin-top:10px;
}
.filter{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}
select,input,button{
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
}
button{
    background:#1976d2;
    color:white;
    cursor:pointer;
}
.chart-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:25px;
}
.chart-box{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
table{
    width:100%;
    border-collapse:collapse;
}
th{
    background:#1976d2;
    color:white;
    padding:10px;
}
td{
    padding:10px;
    border-bottom:1px solid #eee;
    text-align:center;
}
</style>
</head>

<body>

<!-- ✅ ADD LAYOUT -->
<div class="layout">

    <!-- ✅ SIDEBAR (GIỐNG TRANG CHỦ) -->
    <div class="sidebar">
        <h2>ĐÁNH GIÁ</h2>

        <a href="/nguoi_danh_gia/">🏠 Trang chủ</a>
        <a href="/nguoi_danh_gia/khoa-dao-tao">📚 Khóa đào tạo</a>
        <a href="/nguoi_danh_gia/thuc_hien_danh_gia">📝 Thực hiện đánh giá</a>
        <a href="/nguoi_danh_gia/thong_ke_danh_gia">📊 Thống kê đánh giá</a>
        <a href="/dang-xuat">🚪 Đăng xuất</a>
    </div>

    <!-- ✅ CONTENT WRAP -->
    <div class="content">

<div class="container">

<div class="title">📊 Dashboard Đánh Giá Khóa Đào Tạo</div>

<div class="cards">
    <div class="card"><h3>Điểm trung bình</h3><div class="value" id="avg">0</div></div>
    <div class="card"><h3>Điểm cao nhất</h3><div class="value" id="max">0</div></div>
    <div class="card"><h3>Điểm thấp nhất</h3><div class="value" id="min">0</div></div>
    <div class="card"><h3>Tổng lượt đánh giá</h3><div class="value" id="count">0</div></div>
</div>

<div class="filter">
    <select id="filterKhoa"></select>
    <input type="date" id="fromDate">
    <input type="date" id="toDate">
    <button onclick="loadData()">Lọc</button>
    <button onclick="exportExcel()">Export Excel</button>
</div>

<div class="chart-grid">
    <div class="chart-box"><canvas id="barChart"></canvas></div>
    <div class="chart-box"><canvas id="lineChart"></canvas></div>
    <div class="chart-box"><canvas id="pieChart"></canvas></div>
</div>

<br>

<div class="chart-box">
<table>
<thead>
<tr>
<th>Khóa</th>
<th>Nhân viên</th>
<th>Điểm</th>
<th>Ngày</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

    </div>
</div>

<script>

/* ===== API URL FIX CHUẨN ===== */
const API_THONG_KE = "/nguoi_danh_gia/api/thong-ke-danh-gia";
const API_DS_KHOA = "/nguoi_danh_gia/api/ds-khoa-dao-tao";

let barChart, lineChart, pieChart;

/* ================= LOAD KHOA ================= */
async function loadKhoa(){
    try{
        let res = await fetch(API_DS_KHOA);
        let data = await res.json();

        let html = `<option value="">Tất cả khóa</option>`;
        data.forEach(k=>{
            html += `<option value="${k.ma_khoa_dao_tao}">
                        ${k.ten_khoa_dao_tao}
                    </option>`;
        });

        document.getElementById("filterKhoa").innerHTML = html;
    }catch(e){
        console.log("Không load được danh sách khóa", e);
    }
}

/* ================= LOAD DATA ================= */
async function loadData(){

    try{

        let khoa = document.getElementById("filterKhoa").value;
        let from = document.getElementById("fromDate").value;
        let to = document.getElementById("toDate").value;

        let url = `${API_THONG_KE}?khoa=${khoa||""}&from=${from||""}&to=${to||""}`;

        let res = await fetch(url);
        let data = await res.json();

        if(!Array.isArray(data)) data=[];

        data.sort((a,b)=> new Date(a.ngay_danh_gia) - new Date(b.ngay_danh_gia));

        renderDashboard(data);
        renderCharts(data);
        renderTable(data);

    }catch(err){
        console.log("Lỗi load data:",err);
    }
}

/* ================= DASHBOARD ================= */
function renderDashboard(data){

    if(data.length===0){
        avg.innerText=0;
        max.innerText=0;
        min.innerText=0;
        count.innerText=0;
        return;
    }

    let scores=data.map(x=>Number(x.diem)||0);
    let avgScore=scores.reduce((a,b)=>a+b,0)/scores.length;

    avg.innerText=avgScore.toFixed(2);
    max.innerText=Math.max(...scores);
    min.innerText=Math.min(...scores);
    count.innerText=scores.length;
}

/* ================= CHART ================= */
function renderCharts(data){

    if(barChart) barChart.destroy();
    if(lineChart) lineChart.destroy();
    if(pieChart) pieChart.destroy();

    let barCtx=document.getElementById("barChart");
    let lineCtx=document.getElementById("lineChart");
    let pieCtx=document.getElementById("pieChart");

    let map={};
    data.forEach(d=>{
        if(!map[d.ten_khoa]) map[d.ten_khoa]=[];
        map[d.ten_khoa].push(Number(d.diem)||0);
    });

    let barLabels=Object.keys(map);
    let barData=barLabels.map(k=>{
        let arr=map[k];
        return arr.reduce((a,b)=>a+b,0)/arr.length;
    });

    barChart=new Chart(barCtx,{
        type:'bar',
        data:{labels:barLabels,datasets:[{label:'Điểm TB',data:barData}]}
    });

    let lineLabels=data.map(d=> (d.ngay_danh_gia||"").split("T")[0]);
    let lineData=data.map(d=>Number(d.diem)||0);

    lineChart=new Chart(lineCtx,{
        type:'line',
        data:{labels:lineLabels,datasets:[{label:'Điểm',data:lineData}]}
    });

    let pieGroup={">=8":0,"5-8":0,"<5":0};
    data.forEach(d=>{
        let score=Number(d.diem)||0;
        if(score>=8) pieGroup[">=8"]++;
        else if(score>=5) pieGroup["5-8"]++;
        else pieGroup["<5"]++;
    });

    pieChart=new Chart(pieCtx,{
        type:'pie',
        data:{
            labels:Object.keys(pieGroup),
            datasets:[{data:Object.values(pieGroup)}]
        }
    });
}

/* ================= TABLE ================= */
function renderTable(data){
    let html="";
    data.forEach(d=>{
        html+=`
        <tr>
            <td>${d.ten_khoa||""}</td>
            <td>${d.ten_nhan_vien||""}</td>
            <td>${d.diem||0}</td>
            <td>${(d.ngay_danh_gia||"").split("T")[0]}</td>
        </tr>`;
    });
    tableBody.innerHTML=html;
}

/* ================= EXPORT ================= */
function exportExcel(){
    window.location="/nguoi_danh_gia/api/export-excel-danh-gia";
}

/* INIT */
loadKhoa();
loadData();

</script>

</body>
</html>
